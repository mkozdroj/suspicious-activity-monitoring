name: SAM Nightly Security Scan

on:
  schedule:
    # 02:00 UTC every night
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  JAVA_VERSION: '21'

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Scan dependencies with OWASP Dependency Check
        run: |
          ./mvnw dependency-check:check -B --no-transfer-progress \
            -DfailBuildOnCVSS=9 \
            -Dformats=HTML,JSON \
          || echo "::warning::Vulnerabilities found — review dependency-check report"

      - name: Upload dependency check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/dependency-check-report.*
          retention-days: 14

      - name: Notify Slack if scan fails
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🔐 *SAM Nightly Security Scan* found critical vulnerabilities",
              "attachments": [{
                "color": "warning",
                "fields": [
                  { "title": "Repository", "value": "${{ github.repository }}", "short": true },
                  { "title": "Workflow", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
