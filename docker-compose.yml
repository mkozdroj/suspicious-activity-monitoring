services:
  mysql:
    image: mysql:8.0
    container_name: sam-db
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_NON_ROOT_USER}
      MYSQL_PASSWORD: ${DB_NON_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/docker_db_init.sh:/docker-entrypoint-initdb.d/init.sh
      - ./schema:/docker-entrypoint-initdb.d/schema
      - ./data:/docker-entrypoint-initdb.d/data
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sam-app
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_NON_ROOT_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_NON_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data: