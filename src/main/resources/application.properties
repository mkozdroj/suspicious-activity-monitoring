spring.application.name=sam

# Database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sam}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Mail
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# OpenAPI / Swagger
springdoc.swagger-ui.url=/openapi.yaml

# Console
spring.output.ansi.enabled=ALWAYS

# Scheduler
sam.screening.fixed-delay-ms=10000
sam.screening.initial-delay-ms=10000

# Open cases report
sam.reports.open-cases.output-dir=reports
sam.reports.open-cases.file-prefix=open_cases_report
sam.reports.open-cases.scheduler.enabled=true
sam.reports.open-cases.scheduler.fixed-delay-ms=86400000
sam.reports.open-cases.scheduler.initial-delay-ms=60000
sam.reports.investigator-workload.output-dir=reports
sam.reports.investigator-workload.file-prefix=investigator_workload_report
sam.reports.investigator-workload.scheduler.enabled=true
sam.reports.investigator-workload.scheduler.cron=0 0 8 * * MON
sam.reports.investigator-workload.scheduler.zone=Europe/Warsaw
sam.reports.rule-effectiveness.output-dir=reports
sam.reports.rule-effectiveness.file-prefix=rule_effectiveness_report
sam.reports.rule-effectiveness.scheduler.enabled=true
sam.reports.rule-effectiveness.scheduler.cron=0 30 8 * * MON
sam.reports.rule-effectiveness.scheduler.zone=Europe/Warsaw
sam.reports.open-cases.email.enabled=${OPEN_CASES_EMAIL_ENABLED:false}
sam.reports.open-cases.email.from=${OPEN_CASES_EMAIL_FROM:${MAIL_USERNAME:}}
sam.reports.open-cases.email.recipients=${OPEN_CASES_EMAIL_RECIPIENTS:}
sam.reports.open-cases.email.subject=${OPEN_CASES_EMAIL_SUBJECT:Open Cases Report}
sam.reports.open-cases.email.preview-rows=${OPEN_CASES_EMAIL_PREVIEW_ROWS:10}
sam.reports.investigator-workload.email.enabled=${INVESTIGATOR_WORKLOAD_EMAIL_ENABLED:${OPEN_CASES_EMAIL_ENABLED:false}}
sam.reports.investigator-workload.email.from=${INVESTIGATOR_WORKLOAD_EMAIL_FROM:${OPEN_CASES_EMAIL_FROM:${MAIL_USERNAME:}}}
sam.reports.investigator-workload.email.recipients=${INVESTIGATOR_WORKLOAD_EMAIL_RECIPIENTS:${OPEN_CASES_EMAIL_RECIPIENTS:}}
sam.reports.investigator-workload.email.subject=${INVESTIGATOR_WORKLOAD_EMAIL_SUBJECT:Investigator Workload Report}
sam.reports.rule-effectiveness.email.enabled=${RULE_EFFECTIVENESS_EMAIL_ENABLED:${OPEN_CASES_EMAIL_ENABLED:false}}
sam.reports.rule-effectiveness.email.from=${RULE_EFFECTIVENESS_EMAIL_FROM:${OPEN_CASES_EMAIL_FROM:${MAIL_USERNAME:}}}
sam.reports.rule-effectiveness.email.recipients=${RULE_EFFECTIVENESS_EMAIL_RECIPIENTS:${OPEN_CASES_EMAIL_RECIPIENTS:}}
sam.reports.rule-effectiveness.email.subject=${RULE_EFFECTIVENESS_EMAIL_SUBJECT:Rule Effectiveness Report}
